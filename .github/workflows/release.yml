name: Release

# On merge to main of an update-v8 PR (when internal/v8dist/manifest.json
# changes), promote the EXACT artifacts that update-v8's validate job already
# tested to a Release. Never rebuilds: it re-downloads the artifacts from the
# build run id pinned in the manifest, re-verifies their checksums, then tags +
# publishes. update-v8 re-pins source_run_id on every build (including
# developer-fix pushes), so the merged manifest always names the MOST RECENT
# run — that is the run pulled here.
#
# Push events only publish when the commit came from merging a PR whose head
# branch matches automated/update-v8-* (the PRs opened by update-v8.yml).
# Other main pushes that touch the manifest are ignored. workflow_dispatch
# remains for intentional re-publish.
on:
  push:
    branches: [main]
    paths:
      - internal/v8dist/manifest.json
  # Manual re-publish for whatever manifest is currently on main (e.g. after
  # fixing this workflow, since a workflow-only change does not touch the path
  # filter above).
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  # Serialize per version so simultaneous merges cannot double-publish.
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Gate push events: only proceed when this commit is from an update-v8 PR merge.
  gate:
    name: Check update-v8 PR merge
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Decide whether to publish
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "workflow_dispatch — publishing."
            exit 0
          fi

          # PRs associated with this commit (works for merge and squash merges).
          prs="$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '[.[] | select(.base.ref == "main")]')"
          count="$(echo "$prs" | jq 'length')"
          if [ "$count" -eq 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No merged PR into main for ${{ github.sha }} — skipping release."
            exit 0
          fi

          # Accept if any associated PR was opened from an update-v8 branch.
          match="$(echo "$prs" | jq -r '
            [.[] | select(.head.ref | test("^automated/update-v8-"))]
            | if length > 0 then .[0] | "\(.number)\t\(.head.ref)\t\(.title)" else empty end
          ')"
          if [ -z "$match" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Commit is not from an automated/update-v8-* PR — skipping release."
            echo "$prs" | jq -r '.[] | "  #\(.number) head=\(.head.ref) title=\(.title)"'
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Publishing from update-v8 PR: $match"

  release:
    name: Publish Release
    needs: gate
    if: needs.gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read manifest
        id: m
        run: |
          f=internal/v8dist/manifest.json
          echo "tag=$(jq -r .module_version "$f")" >> "$GITHUB_OUTPUT"
          echo "run_id=$(jq -r .source_run_id "$f")" >> "$GITHUB_OUTPUT"
          echo "commit=$(jq -r .source_commit "$f")" >> "$GITHUB_OUTPUT"
          echo "v8=$(jq -r .v8_version "$f")" >> "$GITHUB_OUTPUT"

      - name: Verify preconditions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.m.outputs.tag }}
          RUN_ID: ${{ steps.m.outputs.run_id }}
          SRC_COMMIT: ${{ steps.m.outputs.commit }}
        run: |
          set -e
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "ERROR: manifest has no source_run_id" >&2; exit 1
          fi

          # Tag must not already exist / be published (immutable releases).
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "ERROR: tag $TAG already exists" >&2; exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "ERROR: release $TAG already published" >&2; exit 1
          fi

          # Build run must have succeeded on source_commit. `gh run view` resolves
          # the id within this repo (the checkout's remote), so a run id from another
          # repo 404s here; we additionally assert the run url is under this repo.
          run_json="$(gh run view "$RUN_ID" --json conclusion,headSha,url)"
          echo "$run_json"
          concl="$(echo "$run_json" | jq -r .conclusion)"
          head_sha="$(echo "$run_json" | jq -r .headSha)"
          run_url="$(echo "$run_json" | jq -r .url)"
          if [ "$concl" != "success" ]; then
            echo "ERROR: build run $RUN_ID did not succeed (conclusion=$concl)" >&2; exit 1
          fi
          case "$run_url" in
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/"*) ;;
            *) echo "ERROR: build run $RUN_ID ($run_url) is not in $GITHUB_REPOSITORY" >&2; exit 1 ;;
          esac
          if [ "$head_sha" != "$SRC_COMMIT" ]; then
            echo "ERROR: build run head $head_sha != manifest source_commit $SRC_COMMIT" >&2; exit 1
          fi

      - name: Download artifacts from the build run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.m.outputs.run_id }}
        run: |
          mkdir -p dist
          # One artifact per manifest target: v8-<goos>-<goarch>.
          for name in $(jq -r '.targets[] | "v8-" + .goos + "-" + .goarch' internal/v8dist/manifest.json); do
            echo "Downloading $name ..."
            gh run download "$RUN_ID" -n "$name" -D dist
          done
          # Public headers for glue-only local rebuilds (not in the consumer lib
          # tarball; not pinned in the manifest — verified via sidecar .sha256).
          echo "Downloading v8-headers ..."
          gh run download "$RUN_ID" -n v8-headers -D dist
          ls -la dist

      - name: Verify checksums against manifest
        run: |
          jq -r '.targets[] | .sha256 + "  " + .filename' internal/v8dist/manifest.json > dist/manifest.sha256
          echo "Expected (libs):" && cat dist/manifest.sha256
          ( cd dist && shasum -a 256 -c manifest.sha256 )
          echo "Expected (headers):" && cat dist/v8-headers.tar.gz.sha256
          ( cd dist && shasum -a 256 -c v8-headers.tar.gz.sha256 )

      - name: Create and publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.m.outputs.tag }}
          V8: ${{ steps.m.outputs.v8 }}
        run: |
          cp internal/v8dist/manifest.json dist/manifest.json
          # dist/v8-*.tar.gz includes both platform libs and v8-headers.tar.gz.
          gh release create "$TAG" \
            dist/v8-*.tar.gz dist/v8-*.tar.gz.sha256 dist/manifest.json \
            --target "${GITHUB_SHA}" \
            --title "$TAG (V8 $V8)" \
            --notes "Prebuilt V8 $V8 static libraries for linux (amd64/arm64) and macOS (arm64), plus \`v8-headers.tar.gz\` (public headers for glue-only local rebuilds; see CONTRIBUTING.md).

          Lib tarballs are fetched automatically by \`go generate\` via cmd/v8setup; see README. These are
          the exact artifacts validated on the merged PR (build run ${{ steps.m.outputs.run_id }})."
