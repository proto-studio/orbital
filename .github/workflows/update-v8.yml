name: Update V8

# Rebuilds the committed V8 prebuilt libraries when a newer stable V8 is
# available, gated on passing unit tests, and opens a single PR.
#
# Build model: V8's Linux clang (Chromium's bundled toolchain) is an x86_64
# binary that cross-compiles arm64, so ALL Linux libraries are built on x64
# runners. Tests then run on a native runner per arch (an x64 host can't
# execute arm64 test binaries).
on:
  workflow_dispatch:
  # Enable scheduled runs later, e.g. weekly on Monday 06:00 UTC:
  # schedule:
  #   - cron: '0 6 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether the latest stable V8 differs from the committed pin.
  # ---------------------------------------------------------------------------
  check:
    name: Check for new V8
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.detect.outputs.latest }}
      current: ${{ steps.detect.outputs.current }}
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect latest stable V8
        id: detect
        run: |
          latest="$(bash scripts/latest-v8-version.sh)"
          current="$(grep -E '^V8_VERSION :=' Makefile | sed -E 's/^V8_VERSION := *//')"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          if [ "$latest" != "$current" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New V8 available: $current -> $latest"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already on latest stable V8 ($current); nothing to do."
          fi

  # ---------------------------------------------------------------------------
  # Fetch V8 source once; all platform builds share this cache.
  # ---------------------------------------------------------------------------
  fetch-v8:
    name: Fetch V8 source
    needs: check
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache V8 source (shared across platforms)
        uses: actions/cache@v4
        with:
          path: |
            v8-build/v8
            v8-build/.gclient
            v8-build/.gclient_entries
          key: v8-src-${{ needs.check.outputs.latest }}
          restore-keys: |
            v8-src-

      - name: Install fetch dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 curl

      - name: Fetch V8 source
        run: make v8-fetch V8_VERSION="${{ needs.check.outputs.latest }}" NUM_JOBS=4

  # ---------------------------------------------------------------------------
  # Build each platform's V8 library. Linux builds run on x64 and cross-compile
  # (arm64 via Chromium clang + Debian sysroot). No tests here.
  # ---------------------------------------------------------------------------
  build:
    name: Build V8 (${{ matrix.platform }})
    needs: [check, fetch-v8]
    if: needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS platforms are still disabled; re-enable once validated.
          - platform: linux-x64
            runs-on: ubuntu-latest
          - platform: linux-arm64
            runs-on: ubuntu-latest        # cross-compiled from x64
          # - platform: darwin-x64
          #   runs-on: macos-13
          # - platform: darwin-arm64
          #   runs-on: macos-14
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore shared V8 source
        uses: actions/cache@v4
        with:
          path: |
            v8-build/v8
            v8-build/.gclient
            v8-build/.gclient_entries
          key: v8-src-${{ needs.check.outputs.latest }}
          restore-keys: |
            v8-src-

      - name: Cache V8 build output (${{ matrix.platform }})
        uses: actions/cache@v4
        with:
          path: v8-build/v8/out.gn/${{ matrix.platform }}
          key: v8-out-${{ matrix.platform }}-${{ needs.check.outputs.latest }}-${{ hashFiles('Makefile', 'scripts/build-v8.sh') }}
          restore-keys: |
            v8-out-${{ matrix.platform }}-${{ needs.check.outputs.latest }}-
            v8-out-${{ matrix.platform }}-

      - name: Install V8 build toolchain (Linux)
        if: startsWith(matrix.platform, 'linux-')
        run: bash scripts/ci-install-linux-toolchain.sh

      - name: Build V8
        run: make v8-${{ matrix.platform }} V8_VERSION="${LATEST}" NUM_JOBS=4
        env:
          LATEST: ${{ needs.check.outputs.latest }}

      - name: Upload V8 artifact
        uses: actions/upload-artifact@v7
        with:
          name: v8-${{ matrix.platform }}
          path: deps/v8/${{ matrix.platform }}/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Run unit tests on a NATIVE runner per arch, against the freshly built lib.
  # Gates the PR: every platform must pass.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.platform }})
    needs: [check, build]
    if: needs.check.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runs-on: ubuntu-latest        # native x64 to execute tests
          - platform: linux-arm64
            runs-on: ubuntu-24.04-arm     # native arm64 to execute tests
          # - platform: darwin-x64
          #   runs-on: macos-13
          # - platform: darwin-arm64
          #   runs-on: macos-14
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install C/C++ toolchain (Linux)
        if: startsWith(matrix.platform, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Download built V8 library
        uses: actions/download-artifact@v8
        with:
          name: v8-${{ matrix.platform }}
          path: deps/v8/${{ matrix.platform }}/

      - name: Run tests
        run: make test

  # ---------------------------------------------------------------------------
  # Assemble all platform artifacts, bump the pinned version everywhere, and
  # open a single PR. Runs only if every build + test job succeeded.
  # ---------------------------------------------------------------------------
  pr:
    name: Open update PR
    needs: [check, build, test]
    if: needs.check.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh deps/v8 from artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List this run's v8-<platform> artifacts by name and unpack each one
          # directly into its deps/v8/<platform>/ dir. Using gh by name avoids
          # depending on download-artifact's (version-specific) flatten layout.
          names="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            --paginate --jq '.artifacts[].name | select(startswith("v8-"))')"
          if [ -z "$names" ]; then
            echo "ERROR: no v8-* artifacts found for run ${GITHUB_RUN_ID}" >&2
            exit 1
          fi
          for name in $names; do
            platform="${name#v8-}"
            echo "Refreshing deps/v8/$platform from artifact $name ..."
            rm -rf "deps/v8/$platform"
            mkdir -p "deps/v8/$platform"
            gh run download "${GITHUB_RUN_ID}" -n "$name" -D "deps/v8/$platform"
          done

      - name: Bump pinned V8 version
        run: |
          sed -i -E "s/^V8_VERSION := .*/V8_VERSION := ${LATEST}/" Makefile
          sed -i -E "s/(V8_VERSION:-)[0-9][0-9.]*/\1${LATEST}/" scripts/build-v8.sh
          sed -i -E "s|(<!-- V8_VERSION -->).*(<!-- /V8_VERSION -->)|\1${LATEST}\2|" README.md
        env:
          LATEST: ${{ needs.check.outputs.latest }}

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automated/update-v8-${{ needs.check.outputs.latest }}
          commit-message: "Update V8 to ${{ needs.check.outputs.latest }}"
          title: "Update V8 to ${{ needs.check.outputs.latest }}"
          body: |
            Automated V8 update.

            - Version: `${{ needs.check.outputs.current }}` -> `${{ needs.check.outputs.latest }}`
            - Rebuilt prebuilt libraries for: linux-x64, linux-arm64, darwin-x64, darwin-arm64
            - Linux libs cross-compiled on x64; unit tests passed on a native runner per arch before this PR was opened.

            Bumped `V8_VERSION` in `Makefile`, `scripts/build-v8.sh`, and the README marker.
          add-paths: |
            deps/v8/
            Makefile
            scripts/build-v8.sh
            README.md
